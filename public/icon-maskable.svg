<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="disc" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
  </defs>
  <!-- Safe area for maskable: inner 80% circle. Background fills full canvas. -->
  <rect width="512" height="512" fill="#0a0a0a"/>
  <g transform="translate(256 256)">
    <circle r="200" fill="url(#disc)"/>
    <circle r="180" fill="none" stroke="#2a2a2a" stroke-width="3"/>
    <circle r="160" fill="none" stroke="#2a2a2a" stroke-width="3"/>
    <circle r="140" fill="none" stroke="#2a2a2a" stroke-width="3"/>
    <circle r="120" fill="none" stroke="#2a2a2a" stroke-width="3"/>
    <circle r="100" fill="none" stroke="#2a2a2a" stroke-width="3"/>
    <circle r="72" fill="#10b981"/>
    <circle r="72" fill="none" stroke="#065f46" stroke-width="4"/>
    <circle r="12" fill="#000"/>
    <circle cx="-70" cy="-70" r="50" fill="#fff" opacity="0.05"/>
  </g>
</svg>
